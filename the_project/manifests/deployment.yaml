apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-project-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: the-project
  template:
    metadata:
      labels:
        app: the-project
    spec:
      volumes:
        - name: image-cache
          persistentVolumeClaim:
            claimName: the-project-pvc
      containers:
        - name: the-project
          image: jbbernardo7/the-project:v1.2
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: image-cache
              mountPath: /usr/src/app/files
